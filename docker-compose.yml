services:
  simulador-consultor:
    build:
      context: .
      dockerfile: Dockerfile
    image: simulador-premiacao:latest
    container_name: simulador-consultor
    restart: unless-stopped
    environment:
      DEFAULT_PAGE: consultor-premiacao.html
    ports:
      - "${CONSULTOR_PORT:-8081}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  simulador-supervisor:
    image: simulador-premiacao:latest
    container_name: simulador-supervisor
    restart: unless-stopped
    environment:
      DEFAULT_PAGE: supervisor-premiacao.html
    ports:
      - "${SUPERVISOR_PORT:-8082}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
